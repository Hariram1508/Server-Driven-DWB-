name: CI

on:
  push:
  pull_request:

jobs:
  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdui-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sdui-backend/package-lock.json
      - run: npm ci
      - run: npm run build

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server-driven-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server-driven-ui/package-lock.json
      - run: npm ci
      - run: npm run build
