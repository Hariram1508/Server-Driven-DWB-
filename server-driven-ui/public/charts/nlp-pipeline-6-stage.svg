<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="520" viewBox="0 0 1700 520">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>

<rect x="0" y="0" width="1700" height="520" fill="url(#bgGrad)"/>
<text x="850" y="70" text-anchor="middle" font-size="42" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#0f172a">6-Stage NLP Pipeline</text>
<text x="850" y="105" text-anchor="middle" font-size="18" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#334155">End-to-end flow from raw text to production deployment</text>
<rect x="60" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="180" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">1. Data Collection</text>
<text x="180" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Gather raw text from files,</text>
<text x="180" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">APIs, DB, or streams</text>
<line x1="300" y1="250" x2="324" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="330" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="450" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">2. Text Preprocessing</text>
<text x="450" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Clean, normalize, remove</text>
<text x="450" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">noise, and standardize text</text>
<line x1="570" y1="250" x2="594" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="600" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="720" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">3. Tokenization</text>
<text x="720" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Split text into</text>
<text x="720" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">words/subwords/sentences</text>
<line x1="840" y1="250" x2="864" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="870" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="990" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">4. Feature Extraction</text>
<text x="990" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Convert text to vectors</text>
<text x="990" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">(TF-IDF, embeddings, etc.)</text>
<line x1="1110" y1="250" x2="1134" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1140" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="1260" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">5. Modeling</text>
<text x="1260" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Train or run NLP models for</text>
<text x="1260" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">prediction/inference</text>
<line x1="1380" y1="250" x2="1404" y2="250" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
<rect x="1410" y="180" rx="18" ry="18" width="240" height="140" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
<text x="1530" y="222" text-anchor="middle" font-size="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700" fill="#1e293b">6. Evaluation & Deployment</text>
<text x="1530" y="256" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">Measure performance and</text>
<text x="1530" y="277" text-anchor="middle" font-size="14" font-family="Inter, Segoe UI, Arial, sans-serif" fill="#475569">release to production</text>
</svg>